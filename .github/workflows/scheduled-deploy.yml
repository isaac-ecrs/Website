name: Scheduled site rebuild

on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday 8am UTC
  workflow_dispatch:       # Allow manual trigger from Actions tab

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare Pages deploy
        # --fail makes a 4xx/5xx from the deploy hook fail the workflow
        # instead of silently reporting success.
        run: curl --fail --silent --show-error -X POST "${{ secrets.CF_DEPLOY_HOOK_URL }}"
