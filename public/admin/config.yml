# -------------------------------------------------------
# Decap CMS Configuration for ECRS
# Backend: GitHub OAuth via Sveltia CMS Auth Worker (Cloudflare)
# Hosting: Cloudflare Pages
# -------------------------------------------------------

backend:
  name: github
  repo: EasternCooperative/Website
  branch: main
  auth_scope: public_repo
  base_url: https://sveltia-cms-auth.isaac-cd9.workers.dev

publish_mode: editorial_workflow

local_backend: true

media_folder: 'public/images'
public_folder: '/images'

# -------------------------------------------------------
# Collections
# -------------------------------------------------------
collections:
  # --- PAGES (files collection — one entry per singleton page) ---
  - name: 'pages'
    label: 'Pages'
    files:
      - name: 'landing'
        label: 'Home'
        file: 'src/data/settings/landing.md'
        fields:
          - { label: 'Hero Headline', name: 'heroTitle', widget: 'string' }
          - { label: 'Hero Subtitle', name: 'heroSubtitle', widget: 'text' }
          - { label: '"Who We Are" Heading', name: 'aboutTitle', widget: 'string' }
          - { label: '"Who We Are" Body', name: 'aboutBody', widget: 'markdown' }
          - { label: '"Who We Are" Image', name: 'aboutImage', widget: 'image', required: false }
          - label: '"What to Expect" Section'
            name: 'whatToExpectTitle'
            widget: 'string'
          - { label: '"What to Expect" Subtitle', name: 'whatToExpectSubtitle', widget: 'text' }
          - label: '"What to Expect" Items'
            name: 'whatToExpectItems'
            widget: 'list'
            fields:
              - { label: 'Title', name: 'title', widget: 'string' }
              - { label: 'Description', name: 'description', widget: 'text' }
              - { label: 'Icon (tabler)', name: 'icon', widget: 'string', hint: 'e.g. tabler:palette' }
          - { label: '"Why ECRS?" Heading', name: 'whyTitle', widget: 'string' }
          - { label: '"Why ECRS?" Subtitle', name: 'whySubtitle', widget: 'text' }
          - label: 'Value Pillars ("Why ECRS?" items)'
            name: 'pillars'
            widget: 'list'
            fields:
              - { label: 'Title', name: 'title', widget: 'string' }
              - { label: 'Description', name: 'description', widget: 'text' }
              - { label: 'Icon (tabler)', name: 'icon', widget: 'string', hint: 'e.g. tabler:music' }
          - { label: '"More Events" Eyebrow', name: 'moreEventsEyebrow', widget: 'string' }
          - { label: '"More Events" Heading', name: 'moreEventsHeading', widget: 'string' }
          - { label: '"More Events" View All Button', name: 'moreEventsViewAllText', widget: 'string' }
          - { label: 'CTA Heading', name: 'ctaTitle', widget: 'string' }
          - { label: 'CTA Subtitle', name: 'ctaSubtitle', widget: 'text' }
          - { label: 'CTA Primary Button Text', name: 'ctaPrimaryText', widget: 'string' }
          - { label: 'CTA Primary Button URL', name: 'ctaPrimaryHref', widget: 'string' }
          - { label: 'CTA Secondary Button Text', name: 'ctaSecondaryText', widget: 'string' }
          - { label: 'CTA Secondary Button URL', name: 'ctaSecondaryHref', widget: 'string' }

      - name: 'about'
        label: 'About'
        file: 'src/data/settings/about.json'
        fields:
          - { label: 'Hero Tagline', name: 'heroTagline', widget: 'string' }
          - { label: 'Hero Title', name: 'heroTitle', widget: 'string' }
          - { label: 'Intro Text', name: 'introText', widget: 'text' }
          - { label: 'Intro Image', name: 'introImage', widget: 'image' }
          - { label: 'Intro Image Alt Text', name: 'introImageAlt', widget: 'string' }
          - label: 'Pillars'
            name: 'pillars'
            widget: 'list'
            fields:
              - { label: 'Title', name: 'title', widget: 'string' }
              - { label: 'Description', name: 'description', widget: 'text' }
              - { label: 'Icon (tabler)', name: 'icon', widget: 'string', hint: 'e.g. tabler:heart' }
          - { label: 'CTA Title', name: 'ctaTitle', widget: 'string' }
          - { label: 'CTA Subtitle', name: 'ctaSubtitle', widget: 'text' }
          - { label: 'CTA Primary Button Text', name: 'ctaPrimaryText', widget: 'string' }
          - { label: 'CTA Primary Button URL', name: 'ctaPrimaryHref', widget: 'string' }
          - { label: 'CTA Secondary Button Text', name: 'ctaSecondaryText', widget: 'string' }
          - { label: 'CTA Secondary Button URL', name: 'ctaSecondaryHref', widget: 'string' }

      - name: 'events-list'
        label: 'Events'
        file: 'src/data/settings/events-list.json'
        fields:
          - { label: 'Hero Tagline', name: 'heroTagline', widget: 'string' }
          - { label: 'Hero Title', name: 'heroTitle', widget: 'string' }
          - { label: 'Hero Subtitle', name: 'heroSubtitle', widget: 'text' }
          - { label: 'Upcoming Events Heading', name: 'upcomingHeading', widget: 'string' }
          - { label: 'Past Events Heading', name: 'pastHeading', widget: 'string' }
          - { label: 'No Upcoming Events Message', name: 'emptyStateText', widget: 'string' }

      - name: 'contact'
        label: 'Contact'
        file: 'src/data/settings/contact.json'
        fields:
          - { label: 'Hero Tagline', name: 'heroTagline', widget: 'string' }
          - { label: 'Hero Title', name: 'heroTitle', widget: 'string' }
          - { label: 'Intro Text', name: 'introText', widget: 'text' }
          - {
              label: 'Cognito Form ID',
              name: 'cognitoFormId',
              widget: 'string',
              hint: 'Number from the Cognito Forms embed URL',
            }
          - { label: 'Form Height (px)', name: 'cognitoFormHeight', widget: 'string', default: '600' }

      - name: 'donation'
        label: 'Donate'
        file: 'src/data/settings/donation.json'
        fields:
          - { label: 'Hero Tagline', name: 'heroTagline', widget: 'string' }
          - { label: 'Hero Title', name: 'heroTitle', widget: 'string' }
          - {
              label: 'SEO Description',
              name: 'metaDescription',
              widget: 'text',
              hint: 'Shown in search engine results',
            }
          - { label: 'Intro Text', name: 'introText', widget: 'text' }
          - {
              label: 'Cognito Form ID',
              name: 'cognitoFormId',
              widget: 'string',
              hint: 'The number at the end of the Cognito Forms embed URL (e.g. 17)',
            }
          - {
              label: 'Form Height (px)',
              name: 'cognitoFormHeight',
              widget: 'string',
              default: '600',
              hint: 'Adjust if the form is taller or shorter than the default',
            }

      - name: 'membership'
        label: 'Membership'
        file: 'src/data/settings/membership.json'
        fields:
          - { label: 'Hero Tagline', name: 'heroTagline', widget: 'string' }
          - { label: 'Hero Title', name: 'heroTitle', widget: 'string' }
          - { label: 'Benefits Section Title', name: 'benefitsTitle', widget: 'string' }
          - label: 'Benefits'
            name: 'benefits'
            widget: 'list'
            fields:
              - { label: 'Title', name: 'title', widget: 'string' }
              - { label: 'Description', name: 'description', widget: 'text' }
              - { label: 'Icon (tabler)', name: 'icon', widget: 'string', hint: 'e.g. tabler:ticket' }
          - { label: 'Pricing Section Title', name: 'pricingTitle', widget: 'string' }
          - { label: 'Pricing Intro Text', name: 'pricingIntro', widget: 'text' }
          - label: 'Pricing Tiers'
            name: 'pricingTiers'
            widget: 'list'
            fields:
              - { label: 'Title', name: 'title', widget: 'string' }
              - { label: 'Subtitle', name: 'subtitle', widget: 'string' }
              - { label: 'Price', name: 'price', widget: 'string', hint: 'e.g. $25' }
              - { label: 'Featured (highlighted)', name: 'featured', widget: 'boolean', default: false }
          - { label: 'Form Section Heading', name: 'formHeading', widget: 'string' }
          - { label: 'Form Note', name: 'formNote', widget: 'text' }
          - { label: 'Form Note Email', name: 'formNoteEmail', widget: 'string' }
          - {
              label: 'Cognito Form ID',
              name: 'cognitoFormId',
              widget: 'string',
              hint: 'Number from the Cognito Forms embed URL',
            }
          - { label: 'Form Height (px)', name: 'cognitoFormHeight', widget: 'string', default: '1400' }

      - name: 'people'
        label: 'Our People'
        file: 'src/data/pages/people.json'
        fields:
          - { label: 'Page Title', name: 'title', widget: 'string', default: 'Our People' }
          - label: 'Sections'
            name: 'categories'
            widget: 'list'
            hint: 'Add sections like "Board of Directors", "Volunteers", etc. Leaders are shown automatically above these.'
            fields:
              - { label: 'Section Title', name: 'label', widget: 'string' }
              - label: 'People'
                name: 'people'
                widget: 'list'
                fields:
                  - { label: 'Name', name: 'name', widget: 'string' }
                  - { label: 'Title / Role', name: 'title', widget: 'string', required: false }
                  - { label: 'Photo', name: 'photo', widget: 'image', required: false }
                  - { label: 'Bio', name: 'bio', widget: 'text', required: false }

      - name: 'not-found'
        label: '404 Page'
        file: 'src/data/settings/not-found.json'
        fields:
          - { label: 'Heading', name: 'title', widget: 'string' }
          - { label: 'Subtitle', name: 'subtitle', widget: 'string' }
          - { label: 'Back to Homepage Link Text', name: 'backLinkText', widget: 'string' }

  # --- LEADERS (folder collection — one file per person) ---
  - name: 'leader'
    label: 'Leaders & Instructors'
    label_singular: 'Leader'
    folder: 'src/data/leaders'
    create: true
    identifier_field: name
    slug: '{{fields.name | slugify}}'
    fields:
      - { label: 'Name', name: 'name', widget: 'string' }
      - {
          label: 'Title / Specialty',
          name: 'title',
          widget: 'string',
          required: false,
          hint: 'e.g. Folk Dance Instructor, Musician',
        }
      - { label: 'Photo', name: 'photo', widget: 'image', required: false }
      - { label: 'Bio', name: 'bio', widget: 'text', required: false }

  # --- EVENTS (folder collection — one file per event) ---
  - name: 'event'
    label: 'Events'
    label_singular: 'Event'
    folder: 'src/data/events'
    create: true
    slug: '{{year}}-{{fields.title}}'
    fields:
      - { label: 'Title', name: 'title', widget: 'string' }
      - { label: 'Event Date', name: 'date', widget: 'datetime', date_format: 'YYYY-MM-DD', time_format: false }
      - {
          label: 'End Date',
          name: 'endDate',
          widget: 'datetime',
          date_format: 'YYYY-MM-DD',
          time_format: false,
          required: false,
        }
      - { label: 'Start Time', name: 'startTime', widget: 'string', required: false, hint: 'e.g. 5:00 PM' }
      - { label: 'End Time', name: 'endTime', widget: 'string', required: false, hint: 'e.g. 3:00 PM' }
      - { label: 'Location Name', name: 'location', widget: 'string', hint: 'e.g. Camp Onas' }
      - { label: 'Full Address', name: 'address', widget: 'string', required: false }
      - { label: 'Short Description (excerpt)', name: 'excerpt', widget: 'string', required: false }
      - { label: 'Full Description', name: 'description', widget: 'markdown', required: false }
      - { label: 'Event Image', name: 'image', widget: 'image', required: false }
      - { label: 'Phone', name: 'phone', widget: 'string', required: false, hint: 'Venue phone number' }
      - {
          label: 'Accessibility Note',
          name: 'accessibilityNote',
          widget: 'string',
          required: false,
          hint: 'e.g. Venue is wheelchair accessible',
        }

      # ── Registration ──────────────────────────────────────────────
      - { label: 'Registration URL', name: 'registrationUrl', widget: 'string', required: false }
      - { label: 'Registration Email', name: 'registrationEmail', widget: 'string', required: false }
      - {
          label: 'Registration Deadline',
          name: 'registrationDeadline',
          widget: 'datetime',
          date_format: 'YYYY-MM-DD',
          time_format: false,
          required: false,
        }
      - {
          label: 'Early-Bird Deadline',
          name: 'earlyBirdDeadline',
          widget: 'datetime',
          date_format: 'YYYY-MM-DD',
          time_format: false,
          required: false,
        }
      - {
          label: 'Early-Bird Fee Note',
          name: 'earlyBirdFeeNote',
          widget: 'string',
          required: false,
          hint: 'e.g. $50/adult, $25/child late fee applies after this date',
        }
      - {
          label: 'Cognito Form ID',
          name: 'cognitoFormId',
          widget: 'string',
          required: false,
          hint: 'Number at the end of the Cognito Forms embed URL (e.g. 17)',
        }
      - {
          label: 'Cognito Form Height (px)',
          name: 'cognitoFormHeight',
          widget: 'string',
          required: false,
          default: '800',
          hint: 'Adjust if the form is taller or shorter than the default',
        }

      # ── Pricing ───────────────────────────────────────────────────
      - {
          label: 'Simple Fee',
          name: 'fee',
          widget: 'string',
          required: false,
          hint: 'For day events with a single price, e.g. "Free / $25 adults". Leave blank for multi-tier pricing below.',
        }
      - {
          label: 'Tuition Section Heading',
          name: 'tuitionLabel',
          widget: 'string',
          required: false,
          hint: 'Defaults to "Tuition" if left blank',
        }
      - label: 'Tuition'
        name: 'tuition'
        widget: 'list'
        required: false
        hint: 'Tuition rows (separate from room & board)'
        fields:
          - { label: 'Label', name: 'label', widget: 'string', required: false, hint: 'e.g. Ages 18+' }
          - { label: 'Amount', name: 'amount', widget: 'string', hint: 'e.g. $110' }
          - { label: 'Note', name: 'note', widget: 'string', required: false }
      - label: 'Accommodations'
        name: 'accommodations'
        widget: 'list'
        required: false
        hint: 'Room & board options for residential events'
        fields:
          - { label: 'Name', name: 'name', widget: 'string', hint: 'e.g. Main Lodge' }
          - {
              label: 'Description',
              name: 'description',
              widget: 'string',
              required: false,
              hint: 'e.g. Dorm-style, shared bath, bring linens',
            }
          - label: 'Pricing Tiers'
            name: 'tiers'
            widget: 'list'
            fields:
              - { label: 'Label', name: 'label', widget: 'string', hint: 'e.g. Adults, 2/room' }
              - { label: 'Amount', name: 'amount', widget: 'string', hint: 'e.g. $430' }

      # ── Logistics ─────────────────────────────────────────────────
      - {
          label: 'Meals Included',
          name: 'mealsIncluded',
          widget: 'string',
          required: false,
          hint: 'e.g. Dinner Dec 27 through breakfast Jan 1',
        }
      - {
          label: 'Meals Note',
          name: 'mealsNote',
          widget: 'string',
          required: false,
          hint: 'Dietary accommodations, beverage info, etc.',
        }

      # ── Policies ──────────────────────────────────────────────────
      - {
          label: 'Show Cancellation Policy',
          name: 'showCancellationPolicy',
          widget: 'boolean',
          required: false,
          default: false,
        }
      - {
          label: 'Cancellation Cutoff Date',
          name: 'cancellationCutoffDate',
          widget: 'datetime',
          date_format: 'YYYY-MM-DD',
          time_format: false,
          required: false,
          hint: 'Refunds available before this date. Typically the 1st of the event start month.',
        }
      - label: 'Cancellation Policy'
        name: 'cancellationPolicy'
        widget: 'text'
        required: false
        default: 'Before the cutoff date shown below, Room & Board fees are refundable; tuition is non-refundable. After that date, no refunds can be issued, as we have already made financial commitments to the facility. If you must cancel due to a communicable illness, please contact us immediately — you will receive a 50% refund of your total registration.'
      - { label: 'Show Health Policy', name: 'showHealthPolicy', widget: 'boolean', required: false, default: false }
      - label: 'Health Policy'
        name: 'healthPolicy'
        widget: 'text'
        required: false
        default: 'In the week before the event, please mask when in crowded indoor spaces and monitor your health. If you are sick, we ask that you not come.'

      # ── Classes / Program ─────────────────────────────────────────
      - label: 'Classes'
        name: 'classes'
        widget: 'list'
        required: false
        hint: 'Classes are grouped by period in the order they are entered.'
        fields:
          - { label: 'Class Name', name: 'name', widget: 'string' }
          - {
              label: 'Leader (from Leader Records)',
              name: 'leaderId',
              widget: 'relation',
              collection: 'leader',
              search_fields: ['name'],
              value_field: '{{slug}}',
              display_fields: ['name'],
              required: false,
              hint: 'Link to a leader record for photo and bio. If no record exists yet, use the free-text field below.',
            }
          - {
              label: 'Leader (free text)',
              name: 'leader',
              widget: 'string',
              required: false,
              hint: 'Used when no leader record is linked.',
            }
          - { label: 'Age Range', name: 'ageRange', widget: 'string', required: false, hint: 'e.g. 12+, All ages' }
          - {
              label: 'Period',
              name: 'period',
              widget: 'string',
              required: false,
              hint: 'Used as a section heading, e.g. "Morning – First Period". Leave blank for a flat list.',
            }
          - {
              label: 'Days',
              name: 'days',
              widget: 'string',
              required: false,
              hint: 'Multi-day events only, e.g. "Days 1–2" or "All 4 days".',
            }
          - { label: 'Limited Capacity', name: 'limitedCapacity', widget: 'boolean', required: false, default: false }
          - { label: 'Description', name: 'description', widget: 'text', required: false }
          - {
              label: 'Callout',
              name: 'callout',
              widget: 'string',
              required: false,
              hint: 'Emphasized note shown below the description, e.g. "Open to children 8+ with a participating adult."',
            }

      # ── Additional Info ───────────────────────────────────────────
      - {
          label: 'Newcomer Note',
          name: 'newcomerNote',
          widget: 'string',
          required: false,
          hint: 'e.g. Newcomers receive free tuition',
        }
      - { label: 'Financial Aid Note', name: 'financialAidNote', widget: 'string', required: false }

      - label: 'Tags'
        name: 'tags'
        widget: 'list'
        required: false
        field: { label: 'Tag', name: 'tag', widget: 'string' }

  # --- TESTIMONIALS (folder collection — one file per testimonial) ---
  - name: 'testimonial'
    label: 'Testimonials'
    label_singular: 'Testimonial'
    folder: 'src/data/testimonials'
    create: true
    slug: '{{fields.name | slugify}}'
    summary: '{{fields.quote}}'
    fields:
      - { label: 'Quote', name: 'quote', widget: 'text' }
      - { label: 'Name', name: 'name', widget: 'string', required: false }
      - { label: 'Role / Affiliation', name: 'role', widget: 'string', required: false }

  # --- GLOBAL SETTINGS (navigation, footer, social) ---
  - name: 'settings'
    label: 'Site Settings'
    files:
      - label: 'Global Site Settings'
        name: 'site'
        file: 'src/data/settings/site.json'
        fields:
          - { label: 'Event Page CTA Title', name: 'eventCtaTitle', widget: 'string' }
          - { label: 'Event Page CTA Subtitle', name: 'eventCtaSubtitle', widget: 'text' }
          - label: 'Social Links'
            name: 'socialLinks'
            widget: 'list'
            fields:
              - { label: 'Platform', name: 'platform', widget: 'string', hint: 'e.g. Facebook' }
              - { label: 'URL', name: 'url', widget: 'string', hint: 'Leave blank to hide the icon' }
              - { label: 'Icon (tabler)', name: 'icon', widget: 'string', hint: 'e.g. tabler:brand-facebook' }

      - label: 'Navigation'
        name: 'navigation'
        file: 'src/data/settings/navigation.json'
        fields:
          - label: 'Header Links'
            name: 'links'
            widget: 'list'
            fields:
              - { label: 'Label', name: 'text', widget: 'string' }
              - { label: 'URL', name: 'href', widget: 'string' }
          - label: 'Header CTA Button'
            name: 'cta'
            widget: 'object'
            fields:
              - { label: 'Button Text', name: 'text', widget: 'string' }
              - { label: 'Button URL', name: 'href', widget: 'string' }

      - label: 'Footer'
        name: 'footer'
        file: 'src/data/settings/footer.json'
        fields:
          - { label: 'Footer Note / Copyright', name: 'footNote', widget: 'string' }
          - { label: 'Address', name: 'address', widget: 'string' }
          - label: 'Footer Link Columns'
            name: 'columns'
            widget: 'list'
            fields:
              - { label: 'Column Title', name: 'title', widget: 'string' }
              - label: 'Links'
                name: 'links'
                widget: 'list'
                fields:
                  - { label: 'Label', name: 'text', widget: 'string' }
                  - { label: 'URL', name: 'href', widget: 'string' }
